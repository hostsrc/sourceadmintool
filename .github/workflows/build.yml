name: CI
on:
  push:
  pull_request:
    branches:
     - master
  workflow_dispatch:
  schedule:
    - cron: '53 05 01 * *'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: windows-latest
            qt_arch: win64_msvc2022_64
            os_short: win
          - os: ubuntu-latest
            os_short: linux
          - os: macos-latest
            os_short: mac
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(runner.os, 'Linux')
        run: sudo apt-get update && sudo apt-get install -y libminiupnpc-dev libmaxminddb-dev

      - name: Install dependencies (macOS)
        if: startsWith(runner.os, 'macOS')
        run: brew install miniupnpc libmaxminddb

      - name: Install dependencies (Windows)
        if: startsWith(runner.os, 'Windows')
        run: vcpkg install miniupnpc libmaxminddb --triplet x64-windows-static-md

      - name: Configure MSVC
        if: startsWith(runner.os, 'Windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          arch: ${{ matrix.qt_arch }}
          version: '6.9.0'

      - name: Configure
        if: "!startsWith(runner.os, 'Windows')"
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: startsWith(runner.os, 'Windows')
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static-md

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Package Linux
        if: startsWith(runner.os, 'Linux')
        shell: bash
        run: |
          mkdir -p package/lib/{platforms,xcbglintegrations}
          cp build/SourceAdminTool package
          cp GeoLite2-Country.mmdb app_list_map.ini commands.xml qt.conf package
          cp $QT_ROOT_DIR/lib/{libQt6Widgets.so.6,libQt6Gui.so.6,libQt6Network.so.6,libQt6Core.so.6,libQt6XcbQpa.so.6,libQt6DBus.so.6,libQt6OpenGL.so.6} package/lib || true
          cp $QT_ROOT_DIR/plugins/platforms/libqxcb.so package/lib/platforms || true
          cp $QT_ROOT_DIR/plugins/xcbglintegrations/*.so package/lib/xcbglintegrations || true
          cp -r $QT_ROOT_DIR/plugins/imageformats package/lib || true
          cd package && tar czf ../SAT-linux.tar.gz * && cd ..

      - name: Package macOS
        if: startsWith(runner.os, 'macOS')
        run: |
          macdeployqt build/SourceAdminTool.app
          # macOS 26 CSM requires all code in a process to share the same Team ID.
          # Create a self-signed certificate so all code gets a real, consistent Team ID.
          KEYCHAIN="build.keychain-db"
          KEYCHAIN_PASS="ci-build"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          # Generate self-signed code signing certificate
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/cs.key -out /tmp/cs.crt \
            -days 1 -nodes -subj "/CN=SAT Build" \
            -addext "keyUsage=digitalSignature" \
            -addext "extendedKeyUsage=codeSigning"
          openssl pkcs12 -export -out /tmp/cs.p12 -inkey /tmp/cs.key -in /tmp/cs.crt -passout pass:build
          security import /tmp/cs.p12 -k "$KEYCHAIN" -P "build" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security add-trusted-cert -d -r trustRoot -k "$KEYCHAIN" /tmp/cs.crt
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | grep -oE '"[^"]+"' | tr -d '"')
          echo "Signing identity: $IDENTITY"
          # Strip all existing signatures first (Qt frameworks have Qt's Team ID)
          find build/SourceAdminTool.app -name "*.dylib" -exec codesign --remove-signature {} \; 2>/dev/null || true
          for fw in build/SourceAdminTool.app/Contents/Frameworks/*.framework; do
            name=$(basename "${fw%.framework}")
            binary="$fw/Versions/A/$name"
            [ -f "$binary" ] && codesign --remove-signature "$binary" 2>/dev/null || true
          done
          # Re-sign everything with the self-signed certificate (innermost to outermost)
          find build/SourceAdminTool.app -name "*.dylib" -exec codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN" {} \;
          for fw in build/SourceAdminTool.app/Contents/Frameworks/*.framework; do
            name=$(basename "${fw%.framework}")
            binary="$fw/Versions/A/$name"
            [ -f "$binary" ] && codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN" "$binary"
          done
          find build/SourceAdminTool.app/Contents/Frameworks -name "*.framework" -maxdepth 1 -exec codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN" {} \;
          codesign --force --options runtime --sign "$IDENTITY" --keychain "$KEYCHAIN" build/SourceAdminTool.app
          # Verify
          codesign --verify --deep --strict build/SourceAdminTool.app
          # Clean up
          security delete-keychain "$KEYCHAIN"
          rm -f /tmp/cs.key /tmp/cs.crt /tmp/cs.p12
          mkdir package
          mv build/SourceAdminTool.app package
          cd package && zip -r ../SAT-${{ matrix.os_short }}.zip SourceAdminTool.app && cd ..

      - name: Package Windows
        if: startsWith(runner.os, 'Windows')
        run: |
          windeployqt --no-compiler-runtime --no-opengl-sw --no-system-d3d-compiler --no-translations --dir package build/Release/SourceAdminTool.exe
          Copy-Item GeoLite2-Country.mmdb,app_list_map.ini,commands.xml,build\Release\SourceAdminTool.exe -Destination package -PassThru
          Compress-Archive -Path package\* -DestinationPath SAT-win.zip

      - name: Upload artifact (release archives)
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: SAT-${{ matrix.os_short }}
          path: SAT-*.*

      - name: Upload artifact (CI)
        if: github.ref != 'refs/heads/master' || github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: SAT-${{ matrix.os_short }}-${{ github.sha }}
          path: package

  release:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP 'project\(SourceAdminTool VERSION \K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_SHORT="${{ steps.version.outputs.sha_short }}"
          {
            echo "**Dev build** from \`${SHA_SHORT}\` — version ${VERSION} — $(date -u +%Y-%m-%d)"
            echo ""
            echo "### Recent changes"
            git log --pretty=format:'- %s (`%h`)' --no-merges -15
            echo ""
            echo ""
            echo "> Automated pre-release. May be unstable."
          } > release_notes.md

      - name: Create dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_SHORT="${{ steps.version.outputs.sha_short }}"
          FILES=$(find artifacts -type f -name 'SAT-*.*')

          gh release create dev \
            --title "Dev Build v${VERSION} (${SHA_SHORT})" \
            --notes-file release_notes.md \
            --prerelease \
            --target "$GITHUB_SHA" \
            $FILES
